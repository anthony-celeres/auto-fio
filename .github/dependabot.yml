# Keeps GitHub Actions pinned in workflows current (security patches + new
# major versions). Scoped to actions only: auto-fio has no runtime
# dependencies, and dev deps use `>=` floors that Dependabot can't meaningfully
# bump, so a `pip` ecosystem entry would only add noise.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
