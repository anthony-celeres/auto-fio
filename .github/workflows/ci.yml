name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
        python-version: ['3.9', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - name: Smoke test
        run: python -c "import auto_fio; print('auto-fio', auto_fio.__version__)"
      - run: pytest

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install ruff
      - run: ruff check src tests

  ci-success:
    name: ci-success
    if: always()
    needs: [test, lint]
    runs-on: ubuntu-latest
    steps:
      - name: Gate on test + lint results
        run: |
          echo "test: ${{ needs.test.result }} · lint: ${{ needs.lint.result }}"
          if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.lint.result }}" != "success" ]; then
            echo "::error::CI failed — blocking merge to main."
            exit 1
          fi
          echo "All test and lint jobs passed."
