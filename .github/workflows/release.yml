name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
#
# Flow (matches the "TestPyPI first, then PyPI" policy):
#   * Cut a GitHub Release marked "pre-release"  -> uploads to TestPyPI.
#   * Cut a normal (full) GitHub Release          -> uploads to PyPI.
#   * Trigger manually (workflow_dispatch)        -> builds + checks only,
#                                                    publishes nothing.
#
# One-time setup on each index (pypi.org and test.pypi.org):
#   Add a "pending" Trusted Publisher pointing at
#     owner:  anthony-celeres      repo: auto-fio
#     workflow: release.yml        environment: pypi   (and testpypi)
#   See https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions: {}

jobs:
  # --- Release gate: the exact test + lint that ci.yml runs. Publish jobs are
  # unreachable unless BOTH pass on the released commit, so a red build can
  # never reach PyPI. Kept in sync with .github/workflows/ci.yml by hand.
  test:
    name: test (${{ matrix.os }}, py${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-15]
        python-version: ['3.9', '3.13', '3.14']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true
      - run: python -m pip install --upgrade pip
      - run: pip install ".[dev]"
      - name: Smoke test
        run: python -c "import auto_fio; print('auto-fio', auto_fio.__version__)"
      - run: pytest

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: pip install ruff
      - run: ruff check src tests

  build:
    name: Build sdist + wheel
    needs: [test, lint]  # gate: no green tests+lint, no artifact, no publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: github.event_name == 'release' && github.event.release.prerelease
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/auto-fio/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release' && !github.event.release.prerelease
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/auto-fio/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
