name: Release

# Publishes to PyPI via Trusted Publishing (OIDC) — no API tokens stored.
#
# Flow:
#   * Publish a GitHub Release  -> builds sdist+wheel and uploads to PyPI.
#   * Trigger manually (workflow_dispatch) -> builds + checks only, no publish.
#
# Releases are cut from `main`, which is protected by ci.yml (test + lint on
# every PR), so the released commit has already passed CI — no gate is repeated
# here. `twine check` still validates the built metadata before upload.
#
# One-time setup on pypi.org:
#   Add a "pending" Trusted Publisher pointing at
#     owner: anthony-celeres   repo: auto-fio
#     workflow: release.yml     environment: pypi
#   See https://docs.pypi.org/trusted-publishers/

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions: {}

jobs:
  build:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: '3.13'
      - name: Build
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Validate metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish-pypi:
    name: Publish to PyPI
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/auto-fio/
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
